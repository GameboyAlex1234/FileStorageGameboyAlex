<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draw Your Submission</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #0a0a0a, #050505);
  overflow: hidden;
  font-family: 'Orbitron', sans-serif;
  color: white;
}

.container {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 45px;
  width: min(95vw, 1000px);
  border: 1px solid #0ff;
  border-radius: 25px;
  background: rgba(0, 255, 255, 0.05);
  box-shadow: 0 0 25px #0ff;
  backdrop-filter: blur(8px);
}

h1 {
  margin-top: 0;
  font-size: 2.4rem;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  animation: glowPulse 2s infinite alternate;
}

canvas {
  background: white;
  border: 2px solid #0ff;
  border-radius: 16px;
  box-shadow: 0 0 20px #0ff;
  width: 900px;
  height: 525px;
  max-width: 100%;
  touch-action: none;
}

.buttons {
  margin-top: 20px;
}

button {
  font-family: 'Orbitron', sans-serif;
  background: transparent;
  color: #0ff;
  border: 2px solid #0ff;
  padding: 14px 30px;
  font-size: 1rem;
  margin: 6px;
  border-radius: 10px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow: 0 0 10px #0ff;
  transition: 0.2s;
}

button:hover {
  background: #0ff;
  color: #000;
  box-shadow: 0 0 25px #0ff;
}

#status {
  margin-top: 15px;
  font-size: 0.9em;
  color: #0ff;
}

@keyframes glowPulse {
  0% {
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
  }
  100% {
    text-shadow: 0 0 20px #0ff, 0 0 50px #0ff;
  }
}

.particle {
  position: absolute;
  background: #0ff;
  border-radius: 50%;
  opacity: 0.7;
  animation: floatParticles linear infinite;
  z-index: 1;
}

@keyframes floatParticles {
  0% {
    transform: translateY(100vh) scale(0.5);
    opacity: 0.7;
  }
  100% {
    transform: translateY(-100vh) scale(1);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Draw Your Submission</h1>

  <canvas id="canvas" width="1200" height="700"></canvas>

  <div class="buttons">
    <button id="clear">Clear</button>
    <button id="submit">Submit</button>
  </div>

  <div id="status">Draw, then submit your PNG.</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");

let drawing = false;

const saved = localStorage.getItem("savedDrawing");
if (saved) {
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0);
  };
  img.src = saved;
}

function saveDrawing() {
  localStorage.setItem("savedDrawing", canvas.toDataURL("image/png"));
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;

  return {
    x: (touch.clientX - rect.left) * (canvas.width / rect.width),
    y: (touch.clientY - rect.top) * (canvas.height / rect.height)
  };
}

function start(e) {
  drawing = true;
  const pos = getPos(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function draw(e) {
  if (!drawing) return;
  e.preventDefault();

  const pos = getPos(e);

  ctx.lineWidth = 6;
  ctx.lineCap = "round";
  ctx.strokeStyle = "black";

  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();

  saveDrawing();
}

function stop() {
  drawing = false;
  saveDrawing();
}

canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stop);
canvas.addEventListener("mouseleave", stop);

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", stop);

document.getElementById("clear").onclick = () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  localStorage.removeItem("savedDrawing");
  statusText.textContent = "Canvas cleared.";
};

document.getElementById("submit").onclick = async () => {
  try {
    statusText.textContent = "Sending drawing...";

    const image = canvas.toDataURL("image/png");

    const res = await fetch("/.netlify/functions/submit-drawing", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ image })
    });

    const text = await res.text();

    console.log("Status:", res.status);
    console.log("Response:", text);

    if (res.ok) {
      statusText.textContent = "Drawing sent!";
      alert("Drawing sent!");
    } else {
      statusText.textContent = "Error sending drawing.";
      alert("Error: " + text);
    }
  } catch (err) {
    console.error(err);
    statusText.textContent = "Error sending drawing.";
    alert("Error: " + err.message);
  }
};

for (let i = 0; i < 50; i++) {
  const particle = document.createElement("div");
  particle.className = "particle";

  const size = Math.random() * 4 + 2;

  particle.style.width = size + "px";
  particle.style.height = size + "px";
  particle.style.left = Math.random() * 100 + "vw";
  particle.style.animationDuration = Math.random() * 10 + 5 + "s";

  document.body.appendChild(particle);
}
</script>

</body>
</html>
