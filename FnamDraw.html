<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draw Your Submission</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at center, #0a0a0a, #050505);
  font-family: 'Orbitron', sans-serif;
  color: white;
  overflow-x: hidden;
}

.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 25px;
}

.container {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 28px;
  width: min(96vw, 1050px);
  border: 1px solid #0ff;
  border-radius: 25px;
  background: rgba(0, 255, 255, 0.05);
  box-shadow: 0 0 25px #0ff;
  backdrop-filter: blur(8px);
}

h1 {
  margin: 0 0 18px;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  animation: glowPulse 2s infinite alternate;
}

canvas {
  background: white;
  border: 2px solid #0ff;
  border-radius: 16px;
  box-shadow: 0 0 20px #0ff;
  width: min(100%, 900px);
  height: auto;
  aspect-ratio: 12 / 7;
  touch-action: none;
  display: block;
  margin: 0 auto;
  cursor: crosshair;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 18px;
}

.form-group input,
.form-group textarea {
  width: 100%;
  background: rgba(0, 255, 255, 0.05);
  border: 2px solid #0ff;
  border-radius: 12px;
  color: white;
  font-family: 'Orbitron', sans-serif;
  padding: 14px;
  outline: none;
  box-shadow: 0 0 10px #0ff;
}

.form-group textarea {
  min-height: 80px;
  resize: vertical;
}

.form-group input::placeholder,
.form-group textarea::placeholder {
  color: rgba(255, 255, 255, 0.6);
}

.buttons {
  margin-top: 18px;
}

button {
  font-family: 'Orbitron', sans-serif;
  background: transparent;
  color: #0ff;
  border: 2px solid #0ff;
  padding: 14px 24px;
  font-size: 0.95rem;
  margin: 6px;
  border-radius: 10px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow: 0 0 10px #0ff;
  transition: 0.2s;
}

button:hover,
button.active {
  background: #0ff;
  color: #000;
  box-shadow: 0 0 25px #0ff;
}

#status {
  margin-top: 14px;
  font-size: 0.9em;
  color: #0ff;
}

@keyframes glowPulse {
  0% {
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
  }
  100% {
    text-shadow: 0 0 20px #0ff, 0 0 50px #0ff;
  }
}

.particle {
  position: fixed;
  background: #0ff;
  border-radius: 50%;
  opacity: 0.7;
  animation: floatParticles linear infinite;
  z-index: 1;
  pointer-events: none;
}

@keyframes floatParticles {
  0% {
    transform: translateY(100vh) scale(0.5);
    opacity: 0.7;
  }
  100% {
    transform: translateY(-100vh) scale(1);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="page">
  <div class="container">
    <h1>Draw Your Submission</h1>

    <canvas id="canvas" width="1200" height="700"></canvas>

    <div class="form-group">
      <input id="username" type="text" placeholder="Username">
      <input id="submissionTitle" type="text" placeholder="Submission Title">
      <textarea id="description" placeholder="Description"></textarea>
    </div>

    <div class="buttons">
      <button id="pen" class="active">Pen</button>
      <button id="eraser">Eraser</button>
      <button id="undo">Undo</button>
      <button id="redo">Redo</button>
      <button id="clear">Clear</button>
      <button id="submit">Submit</button>
    </div>

    <div id="status">Pen selected.</div>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");
const usernameInput = document.getElementById("username");
const titleInput = document.getElementById("submissionTitle");
const descriptionInput = document.getElementById("description");
const penButton = document.getElementById("pen");
const eraserButton = document.getElementById("eraser");

let drawing = false;
let lastPos = null;
let tool = "pen";
let undoStack = [];
let redoStack = [];

usernameInput.value = localStorage.getItem("submissionUsername") || "";
titleInput.value = localStorage.getItem("submissionTitle") || "";
descriptionInput.value = localStorage.getItem("submissionDescription") || "";

function saveDrawing() {
  localStorage.setItem("savedDrawing", canvas.toDataURL("image/png"));
}

function saveState() {
  undoStack.push(canvas.toDataURL("image/png"));
  if (undoStack.length > 50) undoStack.shift();
}

function restoreState(data) {
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
    saveDrawing();
  };
  img.src = data;
}

const saved = localStorage.getItem("savedDrawing");

if (saved) {
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0);
    saveState();
  };
  img.src = saved;
} else {
  saveState();
}

function saveFields() {
  localStorage.setItem("submissionUsername", usernameInput.value);
  localStorage.setItem("submissionTitle", titleInput.value);
  localStorage.setItem("submissionDescription", descriptionInput.value);
}

usernameInput.addEventListener("input", saveFields);
titleInput.addEventListener("input", saveFields);
descriptionInput.addEventListener("input", saveFields);

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const source = e.touches ? e.touches[0] : e;

  return {
    x: (source.clientX - rect.left) * (canvas.width / rect.width),
    y: (source.clientY - rect.top) * (canvas.height / rect.height)
  };
}

function insideCanvas(pos) {
  return pos.x >= 0 && pos.x <= canvas.width && pos.y >= 0 && pos.y <= canvas.height;
}

function drawDot(pos) {
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, tool === "eraser" ? 16 : 4, 0, Math.PI * 2);
  ctx.fillStyle = tool === "eraser" ? "white" : "black";
  ctx.fill();
}

function start(e) {
  const pos = getPos(e);

  if (!insideCanvas(pos)) return;

  drawing = true;
  lastPos = pos;
  redoStack = [];

  drawDot(pos);
  saveDrawing();
}

function draw(e) {
  if (!drawing) return;

  e.preventDefault();

  const pos = getPos(e);

  if (!insideCanvas(pos)) {
    lastPos = null;
    return;
  }

  ctx.lineWidth = tool === "eraser" ? 32 : 8;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = tool === "eraser" ? "white" : "black";

  ctx.beginPath();

  if (lastPos) {
    ctx.moveTo(lastPos.x, lastPos.y);
  } else {
    ctx.moveTo(pos.x, pos.y);
  }

  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();

  lastPos = pos;
  saveDrawing();
}

function stop() {
  if (!drawing) return;

  drawing = false;
  lastPos = null;
  saveState();
  saveDrawing();
}

function setTool(newTool) {
  tool = newTool;

  penButton.classList.toggle("active", tool === "pen");
  eraserButton.classList.toggle("active", tool === "eraser");

  canvas.style.cursor = tool === "eraser" ? "cell" : "crosshair";
  statusText.textContent = tool === "eraser" ? "Eraser selected." : "Pen selected.";
}

document.addEventListener("mousedown", start);
document.addEventListener("mousemove", draw);
document.addEventListener("mouseup", stop);

document.addEventListener("touchstart", start, { passive: false });
document.addEventListener("touchmove", draw, { passive: false });
document.addEventListener("touchend", stop);

penButton.onclick = () => {
  setTool("pen");
};

eraserButton.onclick = () => {
  setTool("eraser");
};

document.getElementById("undo").onclick = () => {
  if (undoStack.length <= 1) return;

  redoStack.push(undoStack.pop());
  restoreState(undoStack[undoStack.length - 1]);
  statusText.textContent = "Undo.";
};

document.getElementById("redo").onclick = () => {
  if (redoStack.length === 0) return;

  const state = redoStack.pop();
  undoStack.push(state);
  restoreState(state);
  statusText.textContent = "Redo.";
};

document.getElementById("clear").onclick = () => {
  redoStack = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  saveDrawing();
  saveState();
  statusText.textContent = "Canvas cleared.";
};

document.getElementById("submit").onclick = async () => {
  try {
    saveFields();
    statusText.textContent = "Sending drawing...";

    const username = usernameInput.value.trim();
    const title = titleInput.value.trim();
    const description = descriptionInput.value.trim();
    const image = canvas.toDataURL("image/png");

    const res = await fetch("/.netlify/functions/submit-drawing", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username,
        title,
        description,
        image
      })
    });

    const text = await res.text();

    if (res.ok) {
      statusText.textContent = "Drawing sent!";
      alert("Drawing sent!");
    } else {
      statusText.textContent = "Error sending drawing.";
      alert("Error: " + text);
    }
  } catch (err) {
    statusText.textContent = "Error sending drawing.";
    alert("Error: " + err.message);
  }
};

for (let i = 0; i < 50; i++) {
  const particle = document.createElement("div");
  particle.className = "particle";

  const size = Math.random() * 4 + 2;

  particle.style.width = size + "px";
  particle.style.height = size + "px";
  particle.style.left = Math.random() * 100 + "vw";
  particle.style.animationDuration = Math.random() * 10 + 5 + "s";

  document.body.appendChild(particle);
}
</script>

</body>
</html>
