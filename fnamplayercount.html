<!DOCTYPE html>
<html>
<head>
  <title>Guards Online</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    h1 { font-size: 2em; }
    #count { color: green; }
  </style>
</head>
<body>
  <h1>🛡️ Current Guards Online: <span id="count">Loading...</span></h1>

  <script>
    async function getPlayerCount() {
      try {
        const res = await fetch("https://mygame.com/playercount"); // your API URL
        const data = await res.json();
        document.getElementById("count").textContent = data.players;
      } catch (err) {
        document.getElementById("count").textContent = "Error";
      }
    }

    getPlayerCount();
    setInterval(getPlayerCount, 10000); // refresh every 10 seconds
  </script>
</body>
</html>
